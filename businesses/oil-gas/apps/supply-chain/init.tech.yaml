business: oil-gas
app: supply-chain
project_name_pattern: "{business}-{app}"
priority: important
description: "Procurement, inventory management, and logistics for remote operational sites"
language_output:
  - en
  - vi
default_language: en
theme_options:
  - corporate
  - modern
  - minimal
default_theme: corporate
mode_options:
  - replace_existing
  - new_app
target_users:
  - supply_chain_manager
  - procurement_officer
  - warehouse_operator
  - logistics_coordinator
core_modules:
  - procurement_management
  - inventory_control
  - warehouse_management
  - logistics_coordination
  - vendor_management
  - contract_management
  - demand_planning
  - remote_site_logistics
key_user_flows:
  - Create purchase requisition and approval workflow
  - Track inventory levels at remote sites
  - Coordinate material logistics to offshore/remote
  - Manage vendor contracts and performance
  - Plan demand based on drilling/production schedule
data_entities:
  - PurchaseOrder
  - InventoryItem
  - Warehouse
  - Shipment
  - Vendor
  - Contract
integrations:
  - production-management (inbound)
  - erp (bidirectional)
  - vendor_portal (outbound)
nfr:
  performance: "P95 API < 400ms for core operations"
  security: "RBAC, audit log, encrypted sensitive fields"
  availability: "99.9% monthly"
  ai_governance: "Human review required for AI-generated business logic"
compliance:
  - procurement_compliance
  - import_export
  - hazmat_regulations
