business: oil-gas
app: production-management
project_name_pattern: "{business}-{app}"
priority: essential
description: "Well and facility production monitoring, allocation, optimization, and decline curve analysis"
language_output:
  - en
  - vi
default_language: en
theme_options:
  - corporate
  - modern
  - minimal
default_theme: corporate
mode_options:
  - replace_existing
  - new_app
target_users:
  - production_engineer
  - field_operator
  - production_manager
  - reservoir_engineer
core_modules:
  - well_monitoring
  - production_allocation
  - decline_curve_analysis
  - artificial_lift_optimization
  - facility_management
  - production_reporting
  - downtime_tracking
  - forecast_modeling
key_user_flows:
  - Monitor real-time well production rates
  - Allocate production back to individual wells
  - Analyze decline curves and forecast reserves
  - Optimize artificial lift parameters
  - Generate daily production report
data_entities:
  - Well
  - Production
  - Allocation
  - Facility
  - ForecastModel
  - DowntimeEvent
integrations:
  - scada (inbound)
  - reservoir_model (bidirectional)
  - erp (outbound)
  - iot_sensors (inbound)
nfr:
  performance: "P95 API < 400ms for core operations"
  security: "RBAC, audit log, encrypted sensitive fields"
  availability: "99.9% monthly"
  ai_governance: "Human review required for AI-generated business logic"
compliance:
  - production_reporting
  - regulatory_allocation
  - environmental_monitoring
tech_stack_hints:
  - Time-series DB for production data
  - Edge computing for remote well sites
