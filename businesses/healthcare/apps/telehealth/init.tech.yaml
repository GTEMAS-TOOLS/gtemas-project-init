business: healthcare
app: telehealth
project_name_pattern: "{business}-{app}"
priority: important
description: "Virtual consultation platform with video calls, e-prescriptions, and clinical session notes"
language_output:
  - en
  - vi
default_language: en
theme_options:
  - corporate
  - modern
  - minimal
default_theme: corporate
mode_options:
  - replace_existing
  - new_app
target_users:
  - physician
  - patient
  - nurse
  - specialist
core_modules:
  - video_consultation
  - e_prescription
  - session_notes
  - virtual_waiting_room
  - screen_sharing
  - file_upload
  - follow_up_scheduling
key_user_flows:
  - Patient joins virtual waiting room
  - Physician starts video consultation
  - In-session prescription and note taking
  - Post-session summary sent to patient
  - Follow-up appointment scheduling
data_entities:
  - Session
  - Prescription
  - SessionNote
  - Recording
  - FollowUp
integrations:
  - video_platform (bidirectional)
  - emr-ehr (outbound)
  - pharmacy_system (outbound)
  - appointment_scheduling (bidirectional)
nfr:
  performance: "P95 API < 400ms for core operations"
  security: "RBAC, audit log, encrypted sensitive fields"
  availability: "99.9% monthly"
  ai_governance: "Human review required for AI-generated business logic"
compliance:
  - privacy_policy_controls
  - hipaa
  - telehealth_regulations
