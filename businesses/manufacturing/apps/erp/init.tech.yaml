business: manufacturing
app: erp
project_name_pattern: "{business}-{app}"
priority: essential
description: "Enterprise resource planning for production, procurement, inventory, and finance"
language_output:
  - en
  - vi
default_language: en
theme_options:
  - corporate
  - modern
  - minimal
default_theme: corporate
mode_options:
  - replace_existing
  - new_app
target_users:
  - plant_manager
  - production_planner
  - procurement_officer
  - finance_controller
core_modules:
  - production_planning
  - mrp
  - procurement
  - inventory_management
  - finance_gl_ap_ar
  - sales_orders
  - bom_management
  - cost_accounting
  - supplier_management
key_user_flows:
  - Create production order from sales forecast
  - Run MRP to generate purchase requisitions
  - Receive goods and update inventory
  - Post production output and calculate cost
  - Generate financial reports and close period
data_entities:
  - ProductionOrder
  - BillOfMaterial
  - PurchaseOrder
  - Inventory
  - Supplier
  - CostCenter
  - SalesOrder
  - GLAccount
integrations:
  - mes (bidirectional)
  - wms (bidirectional)
  - crm (inbound)
  - accounting_system (outbound)
nfr:
  performance: "P95 API < 400ms for core operations"
  security: "RBAC, audit log, encrypted sensitive fields"
  availability: "99.9% monthly"
  ai_governance: "Human review required for AI-generated business logic"
compliance:
  - audit_log
  - sox_controls
  - tax_compliance
