business: education
app: admissions-crm
project_name_pattern: "{business}-{app}"
priority: important
description: "Admissions pipeline management from inquiry to enrollment with scholarship workflows"
language_output:
  - en
  - vi
default_language: en
theme_options:
  - corporate
  - modern
  - minimal
default_theme: corporate
mode_options:
  - replace_existing
  - new_app
target_users:
  - admissions_officer
  - marketing_coordinator
  - scholarship_committee
  - department_head
core_modules:
  - lead_capture
  - application_pipeline
  - communication_automation
  - scholarship_workflow
  - document_collection
  - interview_scheduling
  - reporting_dashboard
  - campaign_tracking
key_user_flows:
  - Capture inquiry from website/event and assign counselor
  - Track application through review stages
  - Automate communication at each pipeline stage
  - Evaluate scholarship applications and award
  - Report on conversion funnel by source
data_entities:
  - Lead
  - Application
  - Scholarship
  - Communication
  - Document
  - Interview
  - Campaign
integrations:
  - sis (outbound)
  - email (outbound)
  - sms (outbound)
  - website_form (inbound)
  - calendar (outbound)
nfr:
  performance: "P95 API < 400ms for core operations"
  security: "RBAC, audit log, encrypted sensitive fields"
  availability: "99.9% monthly"
  ai_governance: "Human review required for AI-generated business logic"
compliance:
  - consent_management
  - privacy_policy_controls
  - equal_opportunity
