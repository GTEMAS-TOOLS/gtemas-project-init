business: education
app: sis
project_name_pattern: "{business}-{app}"
priority: essential
description: "Student information system for profiles, enrollment, academic records, and attendance tracking"
language_output:
  - en
  - vi
default_language: en
theme_options:
  - corporate
  - modern
  - minimal
default_theme: corporate
mode_options:
  - replace_existing
  - new_app
target_users:
  - registrar
  - academic_advisor
  - instructor
  - student
  - admin_staff
core_modules:
  - student_profile
  - enrollment_management
  - academic_records
  - attendance_tracking
  - grade_management
  - transcript_generation
  - program_management
  - graduation_audit
key_user_flows:
  - Enroll student in program and courses
  - Record and publish grades
  - Track attendance and trigger alerts for at-risk students
  - Generate official transcript
  - Audit graduation requirements completion
data_entities:
  - Student
  - Program
  - Course
  - Enrollment
  - Grade
  - Attendance
  - Transcript
  - AcademicRecord
integrations:
  - lms (bidirectional)
  - tuition-billing (outbound)
  - admissions-crm (inbound)
  - document-management (bidirectional)
nfr:
  performance: "P95 API < 400ms for core operations"
  security: "RBAC, audit log, encrypted sensitive fields"
  availability: "99.9% monthly"
  ai_governance: "Human review required for AI-generated business logic"
compliance:
  - student_data_privacy
  - ferpa
  - accreditation_standards
