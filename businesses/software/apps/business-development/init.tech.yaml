business: software
app: business-development
project_name_pattern: "{business}-{app}"
priority: advanced
description: "Sales pipeline, proposal management, deal tracking, and account growth for IT services"
language_output:
  - en
  - vi
default_language: en
theme_options:
  - corporate
  - modern
  - minimal
