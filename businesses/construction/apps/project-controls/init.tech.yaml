business: construction
app: project-controls
project_name_pattern: "{business}-{app}"
priority: essential
description: "Project scheduling, cost control, progress tracking, and change order management"
language_output:
  - en
  - vi
default_language: en
theme_options:
  - corporate
  - modern
  - minimal
default_theme: corporate
mode_options:
  - replace_existing
  - new_app
target_users:
  - project_manager
  - project_director
  - cost_engineer
  - planner
core_modules:
  - wbs_schedule
  - cost_control
  - progress_tracking
  - change_order_management
  - earned_value_management
  - rfi_management
  - risk_register
  - reporting_dashboard
  - document_control
key_user_flows:
  - Create WBS and baseline schedule
  - Track actual costs vs. budget by cost code
  - Process change order through approval workflow
  - Submit and track RFI to resolution
  - Generate earned value report for stakeholders
data_entities:
  - Project
  - WBS
  - CostCode
  - ChangeOrder
  - RFI
  - Risk
  - Milestone
  - BudgetLine
  - ProgressReport
integrations:
  - accounting-finance (bidirectional)
  - procurement (bidirectional)
  - field-service (inbound)
  - document-management (bidirectional)
nfr:
  performance: "P95 API < 400ms for core operations"
  security: "RBAC, audit log, encrypted sensitive fields"
  availability: "99.9% monthly"
  ai_governance: "Human review required for AI-generated business logic"
compliance:
  - audit_log
  - contract_compliance
  - earned_value_standards
