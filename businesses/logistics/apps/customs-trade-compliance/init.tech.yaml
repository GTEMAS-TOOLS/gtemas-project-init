business: logistics
app: customs-trade-compliance
project_name_pattern: "{business}-{app}"
priority: advanced
description: "Customs documentation, HS code classification, duty/tax calculation, and trade compliance screening"
language_output:
  - en
  - vi
default_language: en
theme_options:
  - corporate
  - modern
  - minimal
default_theme: corporate
mode_options:
  - replace_existing
  - new_app
target_users:
  - customs_broker
  - trade_compliance_officer
  - import_export_coordinator
core_modules:
  - trade_document_generation
  - hs_code_classification
  - duty_tax_calculation
  - compliance_screening
  - preferential_trade_agreements
  - denied_party_screening
  - audit_trail
  - regulatory_updates
key_user_flows:
  - Generate customs declaration from shipment data
  - Classify goods with correct HS code
  - Calculate duties and taxes for import
  - Screen parties against denied/restricted lists
  - Apply preferential trade agreement for tariff reduction
data_entities:
  - CustomsDeclaration
  - HSCode
  - DutyCalculation
  - TradeAgreement
  - ScreeningResult
  - ComplianceRecord
integrations:
  - tms (inbound)
  - erp (bidirectional)
  - customs_authority_edi (outbound)
  - screening_database (outbound)
nfr:
  performance: "P95 API < 400ms for core operations"
  security: "RBAC, audit log, encrypted sensitive fields"
  availability: "99.9% monthly"
  ai_governance: "Human review required for AI-generated business logic"
compliance:
  - trade_compliance
  - aml_screening
  - export_controls
