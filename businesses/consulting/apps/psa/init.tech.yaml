business: consulting
app: psa
project_name_pattern: "{business}-{app}"
priority: essential
description: "Professional services automation for project planning, resource allocation, time tracking, and profitability analysis"
language_output:
  - en
  - vi
default_language: en
theme_options:
  - corporate
  - modern
  - minimal
default_theme: corporate
mode_options:
  - replace_existing
  - new_app
target_users:
  - engagement_manager
  - resource_manager
  - consultant
  - finance_controller
core_modules:
  - project_planning
  - resource_allocation
  - timesheet_tracking
  - expense_management
  - project_profitability
  - utilization_dashboard
  - skills_inventory
  - milestone_billing
key_user_flows:
  - Create project with budget, milestones, and resource plan
  - Allocate consultants based on skills and availability
  - Consultant logs time and expenses daily
  - PM reviews project health (budget, timeline, margin)
  - Finance generates milestone or T&M invoice
data_entities:
  - Project
  - Resource
  - Timesheet
  - Expense
  - Milestone
  - Budget
  - Skill
  - Allocation
integrations:
  - crm (inbound)
  - accounting-finance (outbound)
  - hris (inbound)
  - calendar (bidirectional)
nfr:
  performance: "P95 API < 400ms for core operations"
  security: "RBAC, audit log, encrypted sensitive fields"
  availability: "99.9% monthly"
  ai_governance: "Human review required for AI-generated business logic"
compliance:
  - audit_log
  - revenue_recognition
  - labor_regulations
