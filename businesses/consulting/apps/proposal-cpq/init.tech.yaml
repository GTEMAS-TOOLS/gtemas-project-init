business: consulting
app: proposal-cpq
project_name_pattern: "{business}-{app}"
priority: important
description: "Proposal builder with pricing, scope configuration, approval workflow, and contract generation"
language_output:
  - en
  - vi
default_language: en
theme_options:
  - corporate
  - modern
  - minimal
default_theme: corporate
mode_options:
  - replace_existing
  - new_app
target_users:
  - business_development
  - partner
  - engagement_manager
  - pricing_analyst
core_modules:
  - proposal_builder
  - scope_configurator
  - pricing_engine
  - approval_workflow
  - contract_generation
  - template_library
  - win_loss_tracking
  - collaboration_review
key_user_flows:
  - Create proposal from template and configure scope
  - Set pricing based on rate cards and effort estimate
  - Route for internal approval (pricing, legal, risk)
  - Generate contract from approved proposal
  - Track win/loss and analyze competitive patterns
data_entities:
  - Proposal
  - Scope
  - PricingModel
  - Approval
  - Contract
  - WinLossRecord
integrations:
  - crm (bidirectional)
  - document-management (outbound)
  - psa (outbound)
  - esign (outbound)
nfr:
  performance: "P95 API < 400ms for core operations"
  security: "RBAC, audit log, encrypted sensitive fields"
  availability: "99.9% monthly"
  ai_governance: "Human review required for AI-generated business logic"
compliance:
  - approval_controls
  - pricing_governance
  - contract_standards
