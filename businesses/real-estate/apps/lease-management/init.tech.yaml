business: real-estate
app: lease-management
project_name_pattern: "{business}-{app}"
priority: important
description: "Lease lifecycle management with terms tracking, renewals, escalations, and compliance dates"
language_output:
  - en
  - vi
default_language: en
theme_options:
  - corporate
  - modern
  - minimal
default_theme: corporate
mode_options:
  - replace_existing
  - new_app
target_users:
  - lease_administrator
  - property_manager
  - legal_team
  - finance_controller
core_modules:
  - lease_terms_tracking
  - renewal_management
  - rent_escalation
  - critical_date_alerts
  - lease_abstraction
  - amendment_tracking
  - reporting
  - document_management
key_user_flows:
  - Abstract key terms from signed lease
  - Track critical dates (expiry, renewal option, escalation)
  - Process renewal negotiation and amendment
  - Calculate rent escalation per clause
  - Generate lease expiry report for portfolio
data_entities:
  - Lease
  - Term
  - RenewalOption
  - Escalation
  - Amendment
  - CriticalDate
  - Document
integrations:
  - property-management (bidirectional)
  - document-management (bidirectional)
  - calendar (outbound)
nfr:
  performance: "P95 API < 400ms for core operations"
  security: "RBAC, audit log, encrypted sensitive fields"
  availability: "99.9% monthly"
  ai_governance: "Human review required for AI-generated business logic"
compliance:
  - contract_controls
  - lease_accounting_standards
  - audit_trail
