business: hospitality
app: booking-engine
project_name_pattern: "{business}-{app}"
priority: important
description: "Direct booking engine for website with availability, pricing, promotions, and upselling"
language_output:
  - en
  - vi
default_language: en
theme_options:
  - corporate
  - modern
  - minimal
default_theme: corporate
mode_options:
  - replace_existing
  - new_app
target_users:
  - guest
  - reservations_manager
  - marketing_manager
  - revenue_manager
core_modules:
  - availability_search
  - rate_display
  - booking_flow
  - promotion_management
  - upsell_cross_sell
  - multi_language
  - mobile_optimized
  - confirmation_emails
key_user_flows:
  - Guest searches availability and selects room
  - Apply promo code and complete booking
  - Upsell room upgrade or add-on during booking
  - Receive confirmation and pre-arrival email
  - Modify or cancel booking self-service
data_entities:
  - Booking
  - RoomAvailability
  - Promotion
  - Upsell
  - Confirmation
  - GuestPreference
integrations:
  - pms (bidirectional)
  - channel_manager (outbound)
  - payment_gateway (bidirectional)
  - email (outbound)
nfr:
  performance: "P95 API < 400ms for core operations"
  security: "RBAC, audit log, encrypted sensitive fields"
  availability: "99.9% monthly"
  ai_governance: "Human review required for AI-generated business logic"
compliance:
  - privacy_policy_controls
  - pci_dss
  - consumer_protection
