business: hospitality
app: pms
project_name_pattern: "{business}-{app}"
priority: essential
description: "Property management system for reservations, check-in/out, room inventory, and folio billing"
language_output:
  - en
  - vi
default_language: en
theme_options:
  - corporate
  - modern
  - minimal
default_theme: corporate
mode_options:
  - replace_existing
  - new_app
target_users:
  - front_desk_agent
  - reservations_manager
  - general_manager
  - night_auditor
core_modules:
  - reservation_management
  - checkin_checkout
  - room_inventory
  - folio_billing
  - guest_profile
  - night_audit
  - group_bookings
  - rate_management
  - reporting_dashboard
key_user_flows:
  - Create reservation and assign room type
  - Check-in guest with ID verification
  - Post charges to guest folio during stay
  - Run night audit and close day
  - Check-out guest and process payment
data_entities:
  - Reservation
  - Room
  - Guest
  - Folio
  - Charge
  - RoomType
  - Rate
  - GroupBlock
integrations:
  - channel_manager (bidirectional)
  - payment_gateway (bidirectional)
  - housekeeping-operations (bidirectional)
  - revenue-management (inbound)
  - booking-engine (inbound)
nfr:
  performance: "P95 API < 400ms for core operations"
  security: "RBAC, audit log, encrypted sensitive fields"
  availability: "99.9% monthly"
  ai_governance: "Human review required for AI-generated business logic"
compliance:
  - audit_log
  - guest_data_privacy
  - tax_controls
